     * Configuración de Tailwind CSS
     * Se definen extensiones para sombras, animaciones y fuentes.
     */
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(255,255,255,0.08), 0 20px 80px rgba(0,0,0,0.35)',
            subtle: '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)'
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-up': 'slideUp 0.4s ease-out forwards',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            }
          }
        }

    /** * Variables Globales y Estilos Base

    :root {

      --stroke: rgba(255, 255, 255, 0.08);
      --accent-pink: #f472b6;
      --accent-sky: #7dd3fc;
    }

    html, body {
      background: radial-gradient(circle at top left, rgba(244, 114, 182, 0.12), transparent 28%),
                  radial-gradient(circle at top right, rgba(125, 211, 252, 0.10), transparent 24%),

      color: #f4f4f5;
      margin: 0;
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
    }

    /* Componentes UI Reutilizables */
    .bento-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

    /* Utils */

    /**
     * COMPONENTE: APP PRINCIPAL
     * Controla el estado global, navegación y renderizado de secciones.
     */
    const App = () => {
      const [tab, setTab] = useState('inicio');
      const [lang, setLang] = useState('es');
      const [docSearch, setDocSearch] = useState('');
      const [newsFilter, setNewsFilter] = useState('Todos');
      const [socialSec, setSocialSec] = useState('guia');
      const [prestSec, setPrestSec] = useState('servicios');
      const [empleoSec, setEmpleoSec] = useState('guia');
      const [scrolled, setScrolled] = useState(false);

      // Memoización de textos para optimización
      const T = useMemo(() => TR[lang], [lang]);

      // Efecto para detectar scroll y cambiar UI de navegación
      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      /**
       * Función para cambiar el idioma
       */
      const toggleLang = useCallback(() => {
        setLang(prev => prev === 'es' ? 'en' : 'es');
      }, []);

       * Filtrado lógico de doctores
       */
      const filteredDocs = useMemo(() => {
        const query = docSearch.toLowerCase().trim();
        if (!query) return DOCS;
        return DOCS.filter(d => 
          (d.name + d.cat + (d.addr || '') + (d.note || '')).toLowerCase().includes(query)
        );
