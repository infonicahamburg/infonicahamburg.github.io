      <div className="grid grid-cols-1 md:grid-cols-[1.5fr_1fr] gap-6">
        <div className="space-y-6">
          <div className="bento-card p-8 rounded-[2rem]">
            <div className="flex flex-col sm:flex-row gap-6 items-start">
              <div className="w-24 h-24 sm:w-32 sm:h-32 shrink-0 rounded-full border-4 border-white/10 overflow-hidden bg-zinc-800">

                <h3 className="text-2xl font-bold text-white">Arvid Daniel Cabrera Pozo</h3>

                </p>
                <p className="text-sm text-zinc-300 leading-relaxed">
                  {lang==='es'?'Si tienes comentarios, sugerencias de información que falta, o ideas para mejorar cada sección de esta web app, por favor, compártela conmigo.':'If you have comments, suggestions for missing information, or ideas to improve each section of this web app, please share them with me.'}
                </p>
              </div>
            </div>
          </div>

             <h4 className="font-bold text-emerald-100 mb-4 text-lg">{lang==='es'?'Comunidad y Contacto':'Community & Contact'}</h4>
             <p className="text-sm text-zinc-300 mb-6">{lang==='es'?'Únete a la comunidad y contáctame directamente por WhatsApp o enviándome un correo.':'Join the community and contact me directly via WhatsApp or email.'}</p>
             <div className="flex flex-wrap gap-4">
               <a href="https://wa.me/49105157841507" target="_blank" rel="noreferrer" className="flex items-center gap-2 rounded-2xl bg-[#25D366]/20 border border-[#25D366]/30 px-5 py-3 text-sm font-bold text-white hover:bg-[#25D366]/30 transition-colors">

        <div className="space-y-6">
          <div className="bento-card p-8 rounded-[2rem] bg-black/40">
            <h4 className="font-bold text-zinc-100 mb-4 uppercase tracking-widest text-xs opacity-70">Impressum / Legal</h4>

              <p><strong>Angaben gemäß § 5 TMG:</strong></p>
              <p>Arvid Daniel Cabrera Pozo</p>
              <p>Wiesendamm 30</p>
              <p>22305 Hamburg</p>
              <div className="pt-4 border-t border-white/10 mt-4">

  return(

            <button key={item.id} onClick={()=>setTab(item.id)} className={`whitespace-nowrap md:whitespace-normal w-auto md:w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium transition-all ${tab===item.id?'active-tab':'text-zinc-400 hover:bg-white/5'}`}>

      <main className="flex-1 p-4 sm:p-6 md:p-10 lg:p-12 max-w-6xl mx-auto w-full animate-fade">

                  <p className="text-sm text-zinc-300 mt-2">{item.text}</p>
                  <a href={item.href} target="_blank" rel="noreferrer" className="text-xs text-zinc-400 mt-4 block underline">{lang==='es'?'Ver fuente':'View source'}</a>

            </div>
          </div>
        )}
        {tab==='prestaciones'&&Prestaciones()}
        {tab==='empleo'&&Empleo()}
        {tab==='social'&&Social()}
        {tab==='edu'&&(
          <div className="space-y-8">
            <Banner label={T.nav.edu} title={lang==='es'?'Educación y Ausbildung':'Education and Ausbildung'} text={lang==='es'?'Orientación sobre estudios, formación profesional y el mercado laboral en Hamburgo.':'Guidance on studies, vocational training and the Hamburg labour market.'} image={IMG.edu} tint="from-amber-400/20 via-transparent to-transparent"/>

              <p className="text-zinc-300 leading-relaxed">{lang==='es'?'Debido a la complejidad del idioma técnico alemán, se recomienda encarecidamente realizar formaciones que superen los 2 años para garantizar estabilidad y aprendizaje real.':'Due to the complexity of the German technical language, it is strongly recommended to undertake training that exceeds 2 years to ensure stability and real learning.'}</p>
            </div>
          </div>
        )}
        {tab==='perfil'&&Perfil()}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
