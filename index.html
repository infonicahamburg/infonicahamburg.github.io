                      className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-semibold transition-all border
                        ${isActive
                          ? `${colorCls} font-bold`
                          : 'text-zinc-400 bg-transparent border-transparent hover:bg-white/5 hover:text-zinc-200'
                        }`}
                    >
                      <span className={`flex-shrink-0 ${isActive?colorCls.split(' ')[0]:'text-zinc-500'}`}>
                        <Icon name={item.icon} size={18}/>
                      </span>
                      <span className="text-left">{T.nav[item.id]}</span>
                      {isActive&&(
                        <span className="ml-auto w-1.5 h-1.5 rounded-full bg-current opacity-60"/>
                      )}
                    </button>
                  );
                })}
              </div>

              {/* Enlace WhatsApp dentro del menú */}
              <div className="mt-6 pt-5 border-t border-white/8">
                <a
                  href="https://chat.whatsapp.com/CYS3is2L24dCZtQrFy35jk"
                  target="_blank"
                  rel="noreferrer"
                  onClick={()=>setIsMenuOpen(false)}
                  className="flex items-center gap-3 px-4 py-3.5 rounded-2xl bg-[#25D366]/15 border border-[#25D366]/25 text-sm font-bold text-white"
                >
                  <Icon name="whatsapp" size={18}/>
                  {lang==='es'?'Unirse a la Comunidad':'Join the Community'}
                </a>
              </div>
            </div>
          </nav>
        </div>
      )}

      {/* ══════════════════════════════════
          DESKTOP SIDEBAR (oculto en móvil)
      ══════════════════════════════════ */}
      <nav className="hidden md:flex w-64 bg-zinc-950/95 border-r border-white/8 p-4 sm:p-6 sticky top-0 h-screen flex-col z-10">
        <div className="flex items-center justify-between mb-6 md:mb-8 px-2">
          <div className="flex items-center gap-3 cursor-pointer" onClick={()=>setTab('inicio')}>
            <img src={IMG.logo} alt="InfoNicaHamburg Logo" className="w-10 h-10 rounded-xl object-cover hover:opacity-80 transition-opacity"/>
            <span className="font-bold text-lg leading-tight hover:text-pink-300 transition-colors">InfoNica<br/>Hamburg</span>
          </div>
          <button onClick={toggleLang} className="flex items-center gap-1.5 rounded-full border border-white/15 bg-white/5 px-3 py-1.5 text-xs font-bold text-zinc-300 hover:bg-white/10 transition-all">
            <Icon name="globe"/>{T.lang}
          </button>
        </div>
        <div className="flex flex-col gap-1 flex-1">
          {NAV.map(item=>(
            <button key={item.id} onClick={()=>setTab(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium transition-all ${tab===item.id?'active-tab':'text-zinc-400 hover:bg-white/5'}`}>
              <Icon name={item.icon}/>{T.nav[item.id]}
            </button>
          ))}
        </div>
      </nav>

      {/* ══════════════════════════════════
          MAIN CONTENT
      ══════════════════════════════════ */}
      <main className="flex-1 p-4 sm:p-6 md:p-10 lg:p-12 max-w-6xl mx-auto w-full animate-fade pt-20 md:pt-10 lg:pt-12">
        {tab==='inicio'&&Home()}
        {tab==='noticias'&&(
          <div className="space-y-8">
            <Banner label="News Hub" title={lang==='es'?'Noticias, comunidad y radio':'News, community and radio'} text={lang==='es'?'Fuentes confiables: BAMF oficial, comunidad hispana y COSMO en español.':'Reliable sources: official BAMF, Hispanic community and COSMO in Spanish.'} image={IMG.noticias} tint="from-sky-400/20 via-transparent to-transparent"/>
            <div className="flex flex-wrap gap-2 pb-2">
              {['Todos','Oficial','Comunidad','Radio/Prensa'].map(f=>(
                <button key={f} onClick={()=>setNewsFilter(f)} className={`px-4 py-2 rounded-full text-xs font-bold border ${newsFilter===f?'bg-white text-black border-white':'bg-zinc-900 text-zinc-400 border-zinc-800'}`}>{f}</button>
              ))}
            </div>
            <div className="grid gap-4">
              {filteredNews.map(item=>(
                <div key={item.title} className="bento-card p-6 rounded-[2rem]">
                  <span className="text-[10px] font-bold px-2 py-1 rounded-full bg-white/8 text-zinc-200">{item.tag}</span>
                  <h4 className="font-bold mt-3 text-lg">{item.title}</h4>
                  <p className="text-sm text-zinc-300 mt-2">{item.text}</p>
                  <a href={item.href} target="_blank" rel="noreferrer" className="flex items-center gap-2 text-xs text-zinc-400 mt-4 underline"><Icon name="link"/> {lang==='es'?'Ver fuente':'View source'}</a>
                </div>
              ))}
            </div>
          </div>
        )}
        {tab==='salud'&&Salud()}
        {tab==='finanzas'&&Finanzas()}
        {tab==='prestaciones'&&Prestaciones()}
        {tab==='empleo'&&Empleo()}
        {tab==='social'&&Social()}
        {tab==='edu'&&Edu()}
        {tab==='orgs'&&Orgs()}
        {tab==='perfil'&&Perfil()}
      </main>

      {/* Botón Flotante WhatsApp */}
      <a href="https://chat.whatsapp.com/CYS3is2L24dCZtQrFy35jk" target="_blank" rel="noreferrer" className="whatsapp-float" style={{bottom: isMenuOpen?'-100px':'24px',transition:'bottom 0.3s ease, transform 0.3s ease'}}>
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      </a>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
