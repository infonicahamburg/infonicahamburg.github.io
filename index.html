<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoNicaHamburg - Guía de Experiencia en Alemania</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { zinc: { 850: '#1f1f22', 900: '#18181b', 950: '#09090b' } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #09090b; color: #f4f4f5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .bento-card { transition: all 0.3s ease; border: 1px solid rgba(63, 63, 70, 0.3); }
        .bento-card:hover { border-color: rgba(161, 161, 170, 0.4); background-color: rgba(24, 24, 27, 0.8); transform: translateY(-2px); }
        .active-tab { background-color: #27272a; color: white; border: 1px solid #3f3f46; }
        .nav-blur { backdrop-filter: blur(12px); background-color: rgba(9, 9, 11, 0.8); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- ICONOS ---
        const Icon = ({ path, className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );

        const icons = {
            home: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
            news: '<path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/>',
            edu: '<path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>',
            social: '<rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10"/>',
            health: '<path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/><path d="m9 12 2 2 4-4"/>',
            finance: '<line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
            user: '<circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/>',
            external: '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/>'
        };

        // --- COMPONENTES DE SECCIÓN ---
        
        const SectionHeader = ({ title, subtitle }) => (
            <div className="mb-8 animate-fade-in">
                <h2 className="text-3xl font-bold text-zinc-100">{title}</h2>
                <p className="text-zinc-500 mt-2">{subtitle}</p>
            </div>
        );

        const ExternalCard = ({ title, desc, link, icon }) => (
            <a href={link} target="_blank" rel="noopener noreferrer" className="bento-card bg-zinc-900/30 p-6 rounded-3xl flex flex-col justify-between group">
                <div>
                    <div className="flex justify-between items-start mb-4">
                        <div className="p-3 bg-zinc-800 rounded-2xl text-zinc-300 group-hover:text-white transition-colors">
                            <Icon path={icon} />
                        </div>
                        <Icon path={icons.external} className="w-4 h-4 text-zinc-600" />
                    </div>
                    <h3 className="text-lg font-semibold text-zinc-200 mb-2">{title}</h3>
                    <p className="text-sm text-zinc-500 leading-relaxed">{desc}</p>
                </div>
                <div className="mt-6 text-xs font-medium text-zinc-400 uppercase tracking-wider">Visitar Sitio Oficial</div>
            </a>
        );

        const Dashboard = ({ setTab }) => (
            <div className="space-y-10">
                {/* Hero con Logo */}
                <div className="relative overflow-hidden rounded-[2.5rem] bg-zinc-900 border border-zinc-800 p-8 md:p-12 flex flex-col md:flex-row items-center gap-8">
                    <img src="./Infonicahamburg.jpeg" className="w-32 h-32 md:w-44 md:h-44 rounded-3xl object-cover shadow-2xl" alt="Logo" />
                    <div className="text-center md:text-left">
                        <h1 className="text-3xl md:text-4xl font-bold text-white mb-4">InfoNicaHamburg</h1>
                        <p className="text-zinc-400 max-w-xl text-lg leading-relaxed">
                            Mi guía personal basada en años de experiencia navegando el sistema en Hamburgo. Información real, directa y sin filtros.
                        </p>
                    </div>
                </div>

                {/* Secciones Destacadas (Carousel Style Grid) */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div onClick={() => setTab('salud')} className="bento-card bg-gradient-to-br from-emerald-500/10 to-transparent p-8 rounded-[2rem] cursor-pointer">
                        <Icon path={icons.health} className="text-emerald-500 mb-4 h-8 w-8" />
                        <h3 className="text-xl font-bold mb-2">Salud</h3>
                        <p className="text-sm text-zinc-500">Doctores en español y cómo usar Doctolib.</p>
                    </div>
                    <div onClick={() => setTab('socialcard')} className="bento-card bg-gradient-to-br from-blue-500/10 to-transparent p-8 rounded-[2rem] cursor-pointer">
                        <Icon path={icons.social} className="text-blue-500 mb-4 h-8 w-8" />
                        <h3 className="text-xl font-bold mb-2">SocialCard</h3>
                        <p className="text-sm text-zinc-500">Gestiona tus servicios y pagos online.</p>
                    </div>
                    <div onClick={() => setTab('educacion')} className="bento-card bg-gradient-to-br from-orange-500/10 to-transparent p-8 rounded-[2rem] cursor-pointer">
                        <Icon path={icons.edu} className="text-orange-500 mb-4 h-8 w-8" />
                        <h3 className="text-xl font-bold mb-2">Educación</h3>
                        <p className="text-sm text-zinc-500">BUT, Escuelas y Ausbildungen de +2 años.</p>
                    </div>
                </div>

                {/* Enlaces Rápidos Oficiales */}
                <h3 className="text-xl font-semibold text-zinc-100">Trámites y Administración</h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <ExternalCard 
                        title="Amt für Migration" 
                        desc="Nueva plataforma para comunicación directa y asilo en Hamburgo."
                        link="https://www.hamburg.de/politik-und-verwaltung/behoerden/behoerde-fuer-inneres-und-sport/asylbewerberleistungen-904606"
                        icon={icons.home}
                    />
                    <ExternalCard 
                        title="Agentur für Arbeit" 
                        desc="Portal oficial para búsqueda de empleo y asesoría laboral."
                        link="https://www.arbeitsagentur.de/"
                        icon={icons.briefcase || icons.home}
                    />
                </div>
            </div>
        );

        const SaludSection = () => (
            <div className="animate-fade-in">
                <SectionHeader title="Salud en Hamburgo" subtitle="Cómo encontrar atención médica en tu idioma y gestionar citas." />
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="bento-card p-6 rounded-3xl bg-zinc-900/50">
                        <h4 className="text-emerald-400 font-bold mb-4 uppercase text-xs tracking-widest">Recomendación</h4>
                        <h3 className="text-xl font-bold mb-3">Doctores en Español</h3>
                        <p className="text-zinc-400 text-sm leading-relaxed mb-4">
                            Hamburgo tiene una comunidad médica latina e hispana amplia. Es vital tener un "Hausarzt" que hable tu idioma para evitar malentendidos.
                        </p>
                        <ul className="space-y-3 text-sm text-zinc-300">
                            <li className="flex items-center gap-2">✔ Busca "Spanisch" en los filtros de especialidad.</li>
                            <li className="flex items-center gap-2">✔ Ten siempre a mano tu tarjeta de seguro (AOK, TK, etc).</li>
                        </ul>
                    </div>
                    <ExternalCard 
                        title="App Doctolib" 
                        desc="La herramienta estándar en Alemania para reservar citas. Puedes filtrar por idioma del doctor."
                        link="https://www.doctolib.de/"
                        icon={icons.health}
                    />
                </div>
            </div>
        );

        const EducacionSection = () => (
            <div className="animate-fade-in">
                <SectionHeader title="Educación y Formación" subtitle="Rutas educativas para adultos y niños." />
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div className="bento-card p-6 rounded-3xl md:col-span-2">
                        <h3 className="text-xl font-bold mb-4 text-orange-400">El camino del Ausbildung</h3>
                        <p className="text-zinc-400 text-sm mb-4">
                            Si el idioma es una barrera para un Umschulung (que es muy rápido e intenso), la ley y la práctica sugieren realizar un **Ausbildung de más de 2 años**. Esto te da estabilidad y un aprendizaje más pausado del idioma técnico.
                        </p>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="p-4 bg-zinc-850 rounded-2xl">
                                <span className="block font-bold text-white mb-1">BUT</span>
                                <span className="text-xs text-zinc-500">Ayudas para material escolar y excursiones.</span>
                            </div>
                            <div className="p-4 bg-zinc-850 rounded-2xl">
                                <span className="block font-bold text-white mb-1">Cursos Int.</span>
                                <span className="text-xs text-zinc-500">Desde A1 hasta B1 obligatorio.</span>
                            </div>
                        </div>
                    </div>
                    <div className="bento-card p-6 rounded-3xl bg-zinc-900/50">
                        <h3 className="text-lg font-bold mb-4">Escuelas</h3>
                        <div className="space-y-4 text-sm">
                            <div className="border-l-2 border-zinc-700 pl-4">
                                <p className="text-zinc-200 font-medium">Primaria (Grundschule)</p>
                                <p className="text-zinc-500 text-xs">Clases de acogida para niños sin alemán.</p>
                            </div>
                            <div className="border-l-2 border-zinc-700 pl-4">
                                <p className="text-zinc-200 font-medium">Secundaria</p>
                                <p className="text-zinc-500 text-xs">Stadtteilschule o Gymnasium según rendimiento.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const SocialCardSection = () => (
            <div className="animate-fade-in">
                <SectionHeader title="SocialCard" subtitle="Guía para el uso de la tarjeta de prestaciones sociales." />
                <div className="max-w-3xl">
                    <ExternalCard 
                        title="Portal Oficial SocialCard" 
                        desc="Aquí puedes revisar tu saldo, transacciones y comunicarte por incidencias con tu tarjeta de servicios."
                        link="https://portal.socialcard.de/"
                        icon={icons.social}
                    />
                    <div className="mt-8 p-8 bg-zinc-900/50 border border-zinc-800 rounded-[2rem]">
                        <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                            <Icon path={icons.info || icons.home} className="text-blue-400" />
                            Consejos de uso
                        </h3>
                        <p className="text-zinc-400 text-sm leading-relaxed italic">
                            "Recuerda que la SocialCard es aceptada en la mayoría de supermercados de Hamburgo. Mantén siempre tu PIN seguro y no lo compartas."
                        </p>
                    </div>
                </div>
            </div>
        );

        const AboutMe = () => (
            <div className="animate-fade-in max-w-2xl mx-auto text-center py-12">
                <img src="./Infonicahamburg.jpeg" className="w-24 h-24 rounded-full mx-auto mb-6 border-2 border-zinc-700" alt="Sobre Mi" />
                <h2 className="text-2xl font-bold mb-4 text-white">Sobre InfoNicaHamburg</h2>
                <div className="bg-zinc-900/50 p-8 rounded-[2.5rem] border border-zinc-800 text-left">
                    <p className="text-zinc-400 leading-relaxed mb-4">
                        Esta plataforma no es una oficina gubernamental. Es el resultado de mi trayectoria personal como migrante en Hamburgo. 
                    </p>
                    <p className="text-zinc-400 leading-relaxed">
                        He pasado por cada trámite: desde el registro inicial hasta entender cómo funcionan las deudas y el sistema de salud. Mi objetivo es que mi experiencia te sirva de atajo para que tu integración sea más humana y menos caótica.
                    </p>
                </div>
            </div>
        );

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('inicio');

            const renderContent = () => {
                switch(activeTab) {
                    case 'inicio': return <Dashboard setTab={setActiveTab} />;
                    case 'noticias': return <ExternalCard title="Noticias BAMF (Facebook)" desc="Sigue las actualizaciones oficiales sobre leyes y asilo directamente desde su canal social." link="https://www.facebook.com/bamf.bund" icon={icons.news} />;
                    case 'salud': return <SaludSection />;
                    case 'educacion': return <EducacionSection />;
                    case 'socialcard': return <SocialCardSection />;
                    case 'finanzas': return <SectionHeader title="Finanzas" subtitle="Gestión de deudas y cuentas bancarias (Próximamente)." />;
                    case 'sobremi': return <AboutMe />;
                    default: return <Dashboard setTab={setActiveTab} />;
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Desktop Sidebar */}
                    <nav className="hidden md:flex w-72 h-screen sticky top-0 flex-col bg-zinc-950 border-r border-zinc-900 p-6">
                        <div className="flex items-center gap-3 mb-10 px-2">
                            <img src="./Infonicahamburg.jpeg" className="w-10 h-10 rounded-xl" />
                            <span className="font-bold text-white tracking-tight">InfoNica</span>
                        </div>
                        <div className="flex-1 space-y-1">
                            {[
                                { id: 'inicio', label: 'Inicio', icon: icons.home },
                                { id: 'noticias', label: 'Noticias', icon: icons.news },
                                { id: 'salud', label: 'Salud', icon: icons.health },
                                { id: 'educacion', label: 'Educación', icon: icons.edu },
                                { id: 'socialcard', label: 'SocialCard', icon: icons.social },
                                { id: 'finanzas', label: 'Finanzas', icon: icons.finance },
                                { id: 'sobremi', label: 'Sobre Mí', icon: icons.user },
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === item.id ? 'active-tab shadow-lg' : 'text-zinc-500 hover:text-zinc-300 hover:bg-zinc-900/50'}`}
                                >
                                    <Icon path={item.icon} />
                                    {item.label}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Mobile Header */}
                    <div className="md:hidden nav-blur sticky top-0 z-50 px-6 py-4 border-b border-zinc-900 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <img src="./Infonicahamburg.jpeg" className="w-8 h-8 rounded-lg" />
                            <span className="font-bold text-white text-sm">InfoNica</span>
                        </div>
                        <Icon path={icons.news} className="text-zinc-400" />
                    </div>

                    {/* Content */}
                    <main className="flex-1 p-6 md:p-12 pb-32">
                        {renderContent()}
                    </main>

                    {/* Mobile Bottom Nav */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 nav-blur border-t border-zinc-900 px-6 py-4 z-50 overflow-x-auto">
                        <div className="flex justify-between items-center min-w-[400px]">
                            {[
                                { id: 'inicio', label: 'Inicio', icon: icons.home },
                                { id: 'salud', label: 'Salud', icon: icons.health },
                                { id: 'educacion', label: 'Edu', icon: icons.edu },
                                { id: 'socialcard', label: 'Social', icon: icons.social },
                                { id: 'sobremi', label: 'Yo', icon: icons.user },
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`flex flex-col items-center gap-1 ${activeTab === item.id ? 'text-white' : 'text-zinc-600'}`}
                                >
                                    <Icon path={item.icon} className="h-6 w-6" />
                                    <span className="text-[10px] font-bold">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
