<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoNicaHamburg - Guía para Solicitantes de Asilo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        zinc: { 850: '#1f1f22', 900: '#18181b', 950: '#09090b' }
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { background-color: #09090b; color: #f4f4f5; margin: 0; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .bento-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .bento-card:hover { transform: translateY(-4px); border-color: #3f3f46; box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7); }
        .logo-glow { filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.1)); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Icon = ({ path, className = "w-6 h-6" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );

        const icons = {
            home: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
            compass: '<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>',
            news: '<path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/>',
            user: '<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
            search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
            book: '<path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>',
            briefcase: '<rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>',
            map: '<path d="M14.106 5.553a2 2 0 0 0-1.212 0l-3.788 1.263a2 2 0 0 1-1.212 0L4.106 5.553A2 2 0 0 0 2 7.447V20.1a2 2 0 0 0 2.618 1.897l3.788-1.263a2 2 0 0 1 1.212 0l3.788 1.263a2 2 0 0 0 2.618-1.897V7.447a2 2 0 0 0-2.106-1.894z"/><path d="M9 6.894v11.212"/><path d="M15 5.894v11.212"/>'
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('inicio');

            return (
                <div className="flex h-screen overflow-hidden bg-zinc-950 text-zinc-300 font-sans">
                    {/* SIDEBAR DESKTOP */}
                    <aside className="hidden md:flex flex-col w-72 border-r border-zinc-800/40 bg-zinc-950 p-8 space-y-10">
                        <div className="flex items-center space-x-3">
                            <img src="./Infonicahamburg.jpeg" alt="Logo" className="w-12 h-12 rounded-xl object-cover border border-zinc-800 logo-glow" />
                            <div className="flex flex-col">
                                <span className="text-sm font-semibold text-zinc-100 leading-tight">InfoNica</span>
                                <span className="text-xs text-zinc-500">Hamburg</span>
                            </div>
                        </div>
                        
                        <nav className="flex-1 space-y-2">
                            {[
                                { id: 'inicio', icon: icons.home, label: 'Dashboard' },
                                { id: 'temas', icon: icons.compass, label: 'Temas de Interés' },
                                { id: 'noticias', icon: icons.news, label: 'Noticias' },
                                { id: 'perfil', icon: icons.user, label: 'Mi Perfil' }
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-2xl transition-all ${activeTab === item.id ? 'bg-zinc-900 text-zinc-100 border border-zinc-800' : 'text-zinc-500 hover:bg-zinc-900/50 hover:text-zinc-300'}`}
                                >
                                    <Icon path={item.icon} className="w-5 h-5" />
                                    <span className="font-medium text-sm">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* ÁREA PRINCIPAL */}
                    <main className="flex-1 flex flex-col h-full overflow-y-auto pb-24 md:pb-0 relative">
                        <header className="sticky top-0 z-10 bg-zinc-950/80 backdrop-blur-xl border-b border-zinc-800/30 px-6 md:px-12 py-5 flex justify-between items-center">
                            <div className="md:hidden flex items-center space-x-3">
                                <img src="./Infonicahamburg.jpeg" alt="Logo" className="w-8 h-8 rounded-lg" />
                                <span className="text-sm font-semibold text-zinc-100">InfoNica</span>
                            </div>
                            <div className="w-full md:max-w-xl relative mx-auto md:mx-0">
                                <Icon path={icons.search} className="w-4 h-4 absolute left-4 top-1/2 transform -translate-y-1/2 text-zinc-600" />
                                <input 
                                    type="text" 
                                    placeholder="Buscar documentos, leyes o ayudas..." 
                                    className="w-full bg-zinc-900/50 border border-zinc-800/60 text-sm text-zinc-200 rounded-2xl pl-11 pr-4 py-3 focus:outline-none focus:border-zinc-500 transition-all placeholder:text-zinc-600"
                                />
                            </div>
                        </header>

                        <div className="p-6 md:p-12 max-w-6xl mx-auto w-full animate-fade-in">
                            {activeTab === 'inicio' ? <DashboardView /> : <UnderConstructionView section={activeTab} />}
                        </div>
                    </main>

                    {/* BOTTOM NAV MOBILE */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-zinc-950/95 backdrop-blur-2xl border-t border-zinc-800/50 pb-safe z-50">
                        <div className="flex justify-around items-center h-20 px-4">
                            {[
                                { id: 'inicio', icon: icons.home, label: 'Inicio' },
                                { id: 'temas', icon: icons.compass, label: 'Temas' },
                                { id: 'noticias', icon: icons.news, label: 'Noticias' },
                                { id: 'perfil', icon: icons.user, label: 'Perfil' }
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`flex flex-col items-center justify-center space-y-1 transition-colors ${activeTab === item.id ? 'text-zinc-100' : 'text-zinc-600'}`}
                                >
                                    <Icon path={item.icon} className="w-6 h-6" />
                                    <span className="text-[10px] font-medium tracking-wide">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        };

        const DashboardView = () => (
            <div className="space-y-10">
                {/* Hero con Logo Grande */}
                <section className="relative group overflow-hidden rounded-[2.5rem] bg-gradient-to-br from-zinc-900 to-zinc-950 border border-zinc-800/50 p-10 md:p-16 text-center bento-card">
                    <img src="./Infonicahamburg.jpeg" alt="InfoNica Logo" className="w-32 h-32 md:w-40 md:h-40 mx-auto mb-8 rounded-[2rem] object-cover shadow-2xl border border-zinc-700/50" />
                    <h1 className="text-3xl md:text-5xl font-semibold text-zinc-100 tracking-tight mb-4">Tu futuro en Hamburgo</h1>
                    <p className="text-zinc-400 text-base md:text-lg max-w-2xl mx-auto leading-relaxed">
                        Información clara y estructurada para navegar el sistema alemán. Simplificamos lo complejo para que te enfoques en crecer.
                    </p>
                </section>

                <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                    {/* Bento: Estudios (Prioritario según tu perfil) */}
                    <div className="md:col-span-8 bg-zinc-900/40 border border-zinc-800/50 rounded-[2rem] overflow-hidden bento-card flex flex-col md:flex-row">
                        <div className="md:w-1/2 h-48 md:h-auto overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200" alt="Estudios" className="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700" />
                        </div>
                        <div className="p-8 md:w-1/2 flex flex-col justify-center">
                            <div className="flex items-center space-x-2 mb-4">
                                <span className="px-3 py-1 bg-zinc-800 text-zinc-300 text-[10px] font-bold uppercase tracking-widest rounded-full border border-zinc-700">Educación</span>
                                <span className="px-3 py-1 bg-blue-500/10 text-blue-400 text-[10px] font-bold uppercase tracking-widest rounded-full border border-blue-500/20">Clave</span>
                            </div>
                            <h3 className="text-xl font-medium text-zinc-100 mb-3">Estudios y Formación</h3>
                            <p className="text-sm text-zinc-400 leading-relaxed mb-6">
                                Debido a la dificultad del idioma, prioriza formaciones (Ausbildung) de más de 2 años. Es el camino más sólido hacia la estabilidad profesional en Alemania.
                            </p>
                            <button className="text-xs font-semibold text-zinc-100 bg-zinc-800 hover:bg-zinc-700 py-3 px-6 rounded-xl transition-colors border border-zinc-700 self-start">Ver guías de estudio</button>
                        </div>
                    </div>

                    {/* Bento: Finanzas */}
                    <div className="md:col-span-4 bg-zinc-900/40 border border-zinc-800/50 rounded-[2rem] p-8 bento-card flex flex-col justify-between">
                        <Icon path={icons.briefcase} className="w-8 h-8 text-zinc-500 mb-6" />
                        <div>
                            <h3 className="text-lg font-medium text-zinc-100 mb-2">Finanzas</h3>
                            <p className="text-sm text-zinc-500 leading-relaxed">Gestión de cuentas bancarias y presupuesto mensual para estudiantes.</p>
                        </div>
                        <div className="mt-8 pt-6 border-t border-zinc-800/50 flex justify-between items-center">
                            <span className="text-[10px] text-zinc-600 font-bold uppercase">4 Guías</span>
                            <Icon path={icons.compass} className="w-4 h-4 text-zinc-700" />
                        </div>
                    </div>

                    {/* Bento: Hamburg Map */}
                    <div className="md:col-span-4 bg-zinc-900/40 border border-zinc-800/50 rounded-[2rem] overflow-hidden bento-card">
                        <img src="https://images.unsplash.com/photo-1541410965313-d53b3c16ef17?q=80&w=800" alt="Hamburg" className="w-full h-40 object-cover opacity-60" />
                        <div className="p-8">
                            <h3 className="text-lg font-medium text-zinc-100 mb-2">Migración Hamburgo</h3>
                            <p className="text-sm text-zinc-500">Oficinas y trámites locales en la ciudad.</p>
                        </div>
                    </div>

                    {/* Bento: Timeline Simplificada */}
                    <div className="md:col-span-8 bg-zinc-900/40 border border-zinc-800/50 rounded-[2rem] p-8 bento-card">
                        <div className="flex items-center justify-between mb-8">
                            <h3 className="text-lg font-medium text-zinc-100">Estado de Trámites</h3>
                            <span className="text-[10px] bg-green-500/10 text-green-400 px-3 py-1 rounded-full border border-green-500/20">Actualizado</span>
                        </div>
                        <div className="space-y-6">
                            {[
                                { title: 'Registro inicial', status: 'Completado', color: 'bg-zinc-700' },
                                { title: 'Curso de alemán B1', status: 'En curso', color: 'bg-blue-500' },
                                { title: 'Búsqueda de formación', status: 'Siguiente paso', color: 'bg-zinc-800' }
                            ].map((step, idx) => (
                                <div key={idx} className="flex items-center justify-between">
                                    <div className="flex items-center space-x-4">
                                        <div className={`w-2 h-2 rounded-full ${step.color}`}></div>
                                        <span className="text-sm text-zinc-300 font-medium">{step.title}</span>
                                    </div>
                                    <span className="text-xs text-zinc-500">{step.status}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );

        const UnderConstructionView = ({ section }) => (
            <div className="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-8 animate-fade-in">
                <div className="relative">
                    <div className="absolute inset-0 bg-zinc-500/10 blur-3xl rounded-full"></div>
                    <Icon path={icons.compass} className="w-16 h-16 text-zinc-700 relative z-10 animate-pulse" />
                </div>
                <div className="space-y-3">
                    <h2 className="text-2xl font-medium text-zinc-100 capitalize">Explorando {section}...</h2>
                    <p className="text-zinc-500 max-w-sm mx-auto">Estamos curando la mejor información con estética "Linear" para esta sección. Vuelve pronto.</p>
                </div>
                <div className="grid grid-cols-2 gap-4 w-full max-w-md opacity-30">
                    <div className="h-32 bg-zinc-900 rounded-3xl border border-zinc-800"></div>
                    <div className="h-32 bg-zinc-900 rounded-3xl border border-zinc-800"></div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
