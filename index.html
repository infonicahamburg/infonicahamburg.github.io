    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }

    <style>

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

            { title: 'Apoyo', value: '116117', desc: 'urgencias fuera de horario', icon: 'briefcase' }

            const [tab, setTab] = useState('inicio');
            const [newsFilter, setNewsFilter] = useState('Todos');

            const newsItems = [
                {
                    type: 'Oficial',
                    tag: 'BAMF OFICIAL',
                    title: 'Información oficial de migración',
                    text: 'Noticias oficiales sobre integración, residencia y permisos en Alemania.',
                    href: 'https://www.facebook.com/bamf.socialmedia/'

                    type: 'Comunidad',
                    tag: 'COMUNIDAD',
                    title: 'Migración en Alemania',
                    text: 'Información comunitaria útil sobre trámites, experiencias y apoyo.',
                    href: 'https://www.facebook.com/migracionenalemania'
                },

                    type: 'Radio/Prensa',
                    tag: 'COSMO',
                    title: 'COSMO en español',
                    text: 'Noticias, entrevistas y podcast para migrantes en Alemania.',
                    href: 'https://www.facebook.com/cosmoestacionsur/'

                                <li>• Noticias oficiales y comunitarias.</li>

                                        </div>
                                        <div className="bento-card p-8 rounded-3xl">
                                            <h4 className="font-bold text-orange-500 mb-2">Portal 116117</h4>
                                            <p className="text-sm text-zinc-400">Para urgencias médicas fuera de horario de oficina.</p>
                                            <a href="https://www.116117.de" className="mt-4 block text-xs underline font-bold tracking-widest">VER URGENCIAS</a>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}

                                <div className="bento-card p-8 rounded-3xl bg-red-500/5 border-red-500/20">

                                </div>
                            </div>
                        )}

                        {tab === 'amt' && (
                            <div className="space-y-8">
                                <h2 className="text-3xl font-bold">Amt für Migration</h2>
                                <div className="bento-card p-8 rounded-3xl">
                                    <h4 className="font-bold text-emerald-500 mb-4">Navegación Web</h4>
                                    <ul className="space-y-4 text-sm text-zinc-400">
                                        <li>1. Entra al portal Hamburg Service.</li>
                                        <li>2. Usa la función "Online-Antrag" para renovaciones de residencia.</li>
                                    </ul>
                                    <a href="https://www.hamburg.de/welcome/" className="mt-6 block bg-white text-black py-3 rounded-xl text-center font-bold text-sm">Portal Oficial</a>
                                </div>
                            </div>
                        )}

                        {tab === 'empleo' && (
                            <div className="space-y-8">
                                <h2 className="text-3xl font-bold">Agencia de Empleo</h2>
                                <div className="bento-card p-8 rounded-3xl border-l-4 border-blue-500">
                                    <h4 className="font-bold mb-2">Agentur für Arbeit</h4>
                                    <p className="text-sm text-zinc-400 mb-4">Búsqueda de empleo y bonos de asesoría (AVGS).</p>
                                    <a href="https://www.arbeitsagentur.de/" className="text-blue-500 text-xs font-bold underline uppercase tracking-widest">Ver Web Oficial</a>
                                </div>
                            </div>
                        )}

                        {tab === 'social' && (
                            <div className="text-center py-20 animate-fade">
                                <h2 className="text-4xl font-bold mb-4">Portal SocialCard</h2>
                                <p className="text-zinc-500 mb-10 max-w-md mx-auto text-sm">Gestiona tus ayudas directas a través del portal oficial de Hamburgo.</p>
                                <a href="https://portal.socialcard.de/" className="bg-purple-600 text-white px-10 py-5 rounded-[2rem] font-bold text-lg hover:shadow-2xl transition-all">ACCEDER AL PORTAL</a>
                            </div>
                        )}

                        {tab === 'edu' && (
                            <div className="space-y-8">
                                <h2 className="text-3xl font-bold">Educación y Ausbildung</h2>
                                <div className="bento-card p-10 rounded-[3rem] border-l-8 border-orange-500">
                                    <h3 className="text-xl font-bold text-orange-500 mb-4">Regla de Oro: Ausbildung > 2 años</h3>
                                    <p className="text-zinc-400 leading-relaxed">
                                        Debido a la complejidad del idioma técnico alemán, se recomienda encarecidamente realizar formaciones que superen los 2 años para garantizar estabilidad y aprendizaje real.
                                    </p>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
